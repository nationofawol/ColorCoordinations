<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weekly Color Charts</title>

  <!-- Google Charts -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <!-- Papa Parse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .container {
      display: flex;
    }

    .left {
      width: 50%;
    }

    .right {
      width: 50%;
      padding: 20px;
    }
  </style>

  <script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    let groupedData = {};

    const colorMap = {
      "White": "#ffffff","Black": "#000000","Pink": "#FF69B4","Tan": "#D6B588",
      "Blue": "#007bff","Green": "#28a745","Gray": "#6c757d","Red": "#dc3545",
      "Yellow": "#ffc107","Orange": "#fd7e14","Purple": "#E6E6FA","Brown": "#964B00"
    };

    const feelingMap = {
      "Joyful": "#ffc107","Proud": "#F54627","Accepted": "#0BC908","Optimistic": "#00CED1",
      "Guilty": "#6A736A","Abandoned": "#584666","Despair": "#111112","Depressed": "#212163",
      "Lonely": "#76A5CC","Bored": "#D17B3B","Disappointed": "#8F6C9E","Hurt": "#ED3A37",
      "Threatened": "#572424","Aggressive": "#B50404","Frustrated": "#D65E5E",
      "Rejected": "#4B1566","Insecure": "#7807B3","Anxious": "#F59A14",
      "Scared": "#130B61","Secure": "#155C07","Overwhelmed": "#E8980E","Energized": "#F5F27D"
    };

    function fetchData() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqnTcuo72ApWjIBwtCm9SUTlRnzgTbBzU7u3hALw7idVOuZDHbtvHWSdxy-dZMpNIMKYkxUMfokgPF/pub?gid=1036373024&single=true&output=csv";

      Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          groupedData = {};

          results.data.forEach(row => {
            const week = row.Week?.trim();
            const color = row.Color?.trim();
            const points = parseFloat(row.Points);
            const type = row.Type?.trim().toLowerCase();

            if (!week || !color || isNaN(points) || points <= 0) return;

            if (!groupedData[week]) groupedData[week] = { Outfit: {}, Feeling: {} };

            if (type === "outfit") groupedData[week].Outfit[color] = (groupedData[week].Outfit[color] || 0) + points;
            if (type === "feeling") groupedData[week].Feeling[color] = (groupedData[week].Feeling[color] || 0) + points;
          });

          populateDropdown();
        }
      });
    }

    function populateDropdown() {
      const select = document.getElementById('weekSelect');
      select.innerHTML = "";

      Object.keys(groupedData).forEach(week => {
        const option = document.createElement('option');
        option.value = week;
        option.textContent = week;
        select.appendChild(option);
      });

      if (select.options.length > 0) {
        const latestWeek = Object.keys(groupedData).pop();
        select.value = latestWeek;
        drawCharts(latestWeek);
      }

      select.addEventListener('change', () => drawCharts(select.value));
    }

    function drawCharts(selectedWeek) {
      drawPie('Outfit – ' + selectedWeek, groupedData[selectedWeek].Outfit, 'piechartOutfit', colorMap);
      drawPie('Feelings – ' + selectedWeek, groupedData[selectedWeek].Feeling, 'piechartFeeling', feelingMap);
    }

    function drawPie(title, weekData, containerId, map) {
      if (!weekData || Object.keys(weekData).length === 0) return;

      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Category');
      data.addColumn('number', 'Points');

      const chartColors = [];

      Object.keys(weekData).forEach(key => {
        data.addRow([key, weekData[key]]);
        chartColors.push(map[key] || "#888");
      });

      const options = {
        title: title,
        pieHole: 0.4,
        legend: { position: 'right' },
        colors: chartColors
      };

      new google.visualization.PieChart(document.getElementById(containerId)).draw(data, options);
    }

    // SIMPLE RIGHT-SIDE BAR CHART (placeholder example)
    window.onload = function() {
      const ctx = document.getElementById("rightChart");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
          datasets: [{
            label: "% Colors",
            data: [30,50,40,60,80,70,55],
            backgroundColor: "blue"
          }]
        }
      });
    };
  </script>
</head>

<body>
  <h2>Weekly Color Breakdown</h2>
  <label>Select Week:</label>
  <select id="weekSelect"></select>

  <div class="container">

    <!-- LEFT SIDE (your existing charts) -->
    <div class="left">
      <div id="piechartOutfit" style="width: 100%; height: 400px;"></div>
      <div id="piechartFeeling" style="width: 100%; height: 400px;"></div>
    </div>

    <!-- RIGHT SIDE (new section) -->
    <div class="right">
      <h3>Daily Color %</h3>
      <canvas id="rightChart"></canvas>
    </div>

  </div>
</body>
</html>
