<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weekly Color Charts</title>

  <!-- Google Charts -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <!-- Papa Parse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    let groupedData = {}; // { Week -> { Outfit: {Color:Points}, Feeling: {Color:Points} } }

    const colorMap = {
      "White": "#ffffff",
      "Black": "#000000",
      "Pink": "#FF69B4",
      "Tan": "#D6B588",
      "Blue": "#007bff",
      "Green": "#28a745",
      "Gray": "#6c757d",
      "Red": "#dc3545",
      "Yellow": "#ffc107",
      "Orange": "#fd7e14",
      "Purple": "#E6E6FA",
      "Brown": "#964B00"
    };
    const feelingMap = {
  "Joyful": "#FFD700",
  "Proud": "#FF8C00",
  "Accepted": "#ADFF2F",
  "Optimistic": "#00CED1",
  "Guilty": "#8B0000",
  "Abandoned": "#A9A9A9",
  "Despair": "#4B0082",
  "Depressed": "#00008B",
  "Lonely": "#708090",
  "Bored": "#D3D3D3",
  "Disappointed": "#FFA07A",
  "Hurt": "#B22222",
  "Threatened": "#FF4500",
  "Aggressive": "#DC143C",
  "Frustrated": "#FF6347",
  "Rejected": "#800000",
  "Insecure": "#2F4F4F",
  "Anxious": "#FF1493",
  "Scared": "#8B0000",
  "Secure": "#32CD32",
  "Overwhelmed": "#9932CC"
};

    function fetchData() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqnTcuo72ApWjIBwtCm9SUTlRnzgTbBzU7u3hALw7idVOuZDHbtvHWSdxy-dZMpNIMKYkxUMfokgPF/pub?gid=1036373024&single=true&output=csv";

      Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          groupedData = {};

          results.data.forEach(row => {
            const week = (row.Week || "").toString().trim();
            const color = (row.Color || "").toString().trim();
            const points = parseFloat((row.Points || "0").toString().trim());
            const type = (row.Type || "").toString().trim().toLowerCase();

            if (!week || !color || isNaN(points) || points <= 0) return;

            if (!groupedData[week]) groupedData[week] = { Outfit: {}, Feeling: {} };

            if (type === "outfit") groupedData[week].Outfit[color] = (groupedData[week].Outfit[color] || 0) + points;
            if (type === "feeling") groupedData[week].Feeling[color] = (groupedData[week].Feeling[color] || 0) + points;
          });

          populateDropdown();
        },
        error: function(err) {
          console.error("CSV parsing error:", err);
        }
      });
    }

    function populateDropdown() {
      const select = document.getElementById('weekSelect');
      select.innerHTML = "";

      Object.keys(groupedData).forEach(week => {
        const option = document.createElement('option');
        option.value = week;
        option.textContent = week;
        select.appendChild(option);
      });

      if (select.options.length > 0) {
        const latestWeek = Object.keys(groupedData).pop();
        select.value = latestWeek;
        drawCharts(latestWeek);
      }

      select.addEventListener('change', () => drawCharts(select.value));
    }

  function drawCharts(selectedWeek) {
  drawPie('Colors Worn – ' + selectedWeek, groupedData[selectedWeek].Outfit, 'piechartOutfit', colorMap);
  drawPie('Feelings – ' + selectedWeek, groupedData[selectedWeek].Feeling, 'piechartFeeling', feelingMap);
}

function drawPie(title, weekData, containerId, map) {
  if (!weekData || Object.keys(weekData).length === 0) return;

  const data = new google.visualization.DataTable();
  data.addColumn('string', 'Category');
  data.addColumn('number', 'Points');

  const chartColors = [];
  const slices = {};

  Object.keys(weekData).forEach((key, index) => {
    const points = Number(weekData[key]);
    data.addRow([key, points]);

    const fillColor = map[key] || "#888888"; // use colorMap or feelingMap
    chartColors.push(fillColor);

    if (key.toLowerCase() === "white") slices[index] = { textStyle: { color: '#000000' } };
  });

  const options = {
    title: title,
    pieHole: 0.4,
    legend: { position: 'right' },
    colors: chartColors,
    slices: slices
  };

  const chart = new google.visualization.PieChart(document.getElementById(containerId));
  chart.draw(data, options);
}
  </script>
</head>
<body>
  <h2>Weekly Color Breakdown</h2>
  <label for="weekSelect">Select Week:</label>
  <select id="weekSelect"></select>

  <div id="piechartOutfit" style="width: 700px; height: 500px;"></div>
  <div id="piechartFeeling" style="width: 700px; height: 500px;"></div>
</body>
</html>
