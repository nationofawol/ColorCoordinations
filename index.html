<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Weekly Color Chart</title>

    <!-- Load Google Charts -->
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <!-- Load Papa Parse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(fetchAndDraw);

      function fetchAndDraw() {
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqnTcuo72ApWjIBwtCm9SUTlRnzgTbBzU7u3hALw7idVOuZDHbtvHWSdxy-dZMpNIMKYkxUMfokgPF/pub?gid=1036373024&single=true&output=csv";

        Papa.parse(csvUrl, {
          download: true,
          header: true,
          complete: function(results) {
            const rows = results.data;

            const data = new google.visualization.DataTable();
            data.addColumn('string', 'Color');  // labels
            data.addColumn('number', 'Points'); // values

            // Add rows only for Week 3/30/26
            rows.forEach(row => {
              const color = (row.Color || "").trim(); // force string
              const points = Number(row.Points || 0);

              if (row.Week === "Week 3/30/26" && color) {
                data.addRow([color, points]);
              }
            });

            const options = {
              title: 'Colors Worn – Week 3/30/26',
              pieHole: 0.4,
              legend: { position: 'right' }
            };

            const chart = new google.visualization.PieChart(document.getElementById('piechart'));
            chart.draw(data, options);
          }
        });
      }
    </script>
  </head>

  <body>
    <h2>Weekly Color Breakdown – Week 3/30/26</h2>
    <div id="piechart" style="width: 700px; height: 500px;"></div>
  </body>
</html>
