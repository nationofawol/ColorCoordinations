<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weekly Color Charts</title>
<style>
.container {
  display: flex;              /* puts left + right side-by-side */
  align-items: flex-start;
}

.left {
  width: 60%;
  padding: 10px;
}

.right {
  width: 40%;
  padding: 10px;
}
</style>
  <!-- Google Charts -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Papa Parse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);
    google.charts.setOnLoadCallback(fetchDailyData);

    let groupedData = {}; // { Week -> { Outfit: {Color:Points}, Feeling: {Color:Points} } }

    const colorMap = {
      "White": "#ffffff",
      "Black": "#000000",
      "Pink": "#FF69B4",
      "Tan": "#D6B588",
      "Blue": "#007bff",
      "Green": "#28a745",
      "Gray": "#6c757d",
      "Red": "#dc3545",
      "Yellow": "#ffc107",
      "Orange": "#fd7e14",
      "Purple": "#E6E6FA",
      "Brown": "#964B00"
    };
    const feelingMap = {
  "Joyful": "#ffc107",
  "Proud": "#F54627",
  "Accepted": "#0BC908",
  "Optimistic": "#00CED1",
  "Guilty": "#6A736A",
  "Abandoned": "#584666",
  "Despair": "#111112",
  "Depressed": "#212163",
  "Lonely": "#76A5CC",
  "Bored": "#D17B3B",
  "Disappointed": "#8F6C9E",
  "Hurt": "#ED3A37",
  "Threatened": "#572424",
  "Aggressive": "#B50404",
  "Frustrated": "#D65E5E",
  "Rejected": "#4B1566",
  "Insecure": "#7807B3",
  "Anxious": "#F59A14",
  "Scared": "#130B61",
  "Secure": "#155C07",
  "Overwhelmed": "#E8980E"
};

    function fetchData() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqnTcuo72ApWjIBwtCm9SUTlRnzgTbBzU7u3hALw7idVOuZDHbtvHWSdxy-dZMpNIMKYkxUMfokgPF/pub?gid=1036373024&single=true&output=csv";

      Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          groupedData = {};

          results.data.forEach(row => {
            const week = (row.Week || "").toString().trim();
            const color = (row.Color || "").toString().trim();
            const points = parseFloat((row.Points || "0").toString().trim());
            const type = (row.Type || "").toString().trim().toLowerCase();

            if (!week || !color || isNaN(points) || points <= 0) return;

            if (!groupedData[week]) groupedData[week] = { Outfit: {}, Feeling: {} };

            if (type === "outfit") groupedData[week].Outfit[color] = (groupedData[week].Outfit[color] || 0) + points;
            if (type === "feeling") groupedData[week].Feeling[color] = (groupedData[week].Feeling[color] || 0) + points;
          });

          populateDropdown();
        },
        error: function(err) {
          console.error("CSV parsing error:", err);
        }
      });
    }

    function populateDropdown() {
      const select = document.getElementById('weekSelect');
      select.innerHTML = "";

      Object.keys(groupedData).forEach(week => {
        const option = document.createElement('option');
        option.value = week;
        option.textContent = week;
        select.appendChild(option);
      });

      if (select.options.length > 0) {
        const latestWeek = Object.keys(groupedData).pop();
        select.value = latestWeek;
        drawCharts(latestWeek);
      }

      select.addEventListener('change', () => drawCharts(select.value));
    }

  function drawCharts(selectedWeek) {
  drawPie('Weekly Analysis of Colors Worn – ' + selectedWeek, groupedData[selectedWeek].Outfit, 'piechartOutfit', colorMap);
  drawPie('Weekly Analysis of Feelings – ' + selectedWeek, groupedData[selectedWeek].Feeling, 'piechartFeeling', feelingMap);
}

function drawPie(title, weekData, containerId, map) {
  if (!weekData || Object.keys(weekData).length === 0) return;

  const data = new google.visualization.DataTable();
  data.addColumn('string', 'Category');
  data.addColumn('number', 'Points');

  const chartColors = [];
  const slices = {};

  Object.keys(weekData).forEach((key, index) => {
    const points = Number(weekData[key]);
    data.addRow([key, points]);

    const fillColor = map[key] || "#888888"; // use colorMap or feelingMap
    chartColors.push(fillColor);

    if (key.toLowerCase() === "white") slices[index] = { textStyle: { color: '#000000' } };
  });

  const options = {
    title: title,
    pieHole: 0.4,
    legend: { position: 'right' },
    colors: chartColors,
    slices: slices
  };

  const chart = new google.visualization.PieChart(document.getElementById(containerId));
  chart.draw(data, options);
}





    // ===== DAILY BAR CHART SECTION =====

let groupedDaily = {};
let barChartInstance = null;

// safely map colors
function getColorFromMap(color) {
  if (!color) return "#888";
  const fixed = color.trim().charAt(0).toUpperCase() + color.trim().slice(1).toLowerCase();
  return colorMap[fixed] || "#888";
}

// fetch daily CSV (Primary / Secondary / Tertiary)
function fetchDailyData() {
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqnTcuo72ApWjIBwtCm9SUTlRnzgTbBzU7u3hALw7idVOuZDHbtvHWSdxy-dZMpNIMKYkxUMfokgPF/pub?gid=0&single=true&output=csv";

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      groupedDaily = {};

      results.data.forEach(row => {
        const day = (row.DayofWeek || "Day of Week").trim();
        const primary = (row.PrimaryColor || "Primary Color").trim();
        const secondary = (row.SecondaryColor || "Secondary Color").trim();
        const tertiary = (row.TertiaryColor || "Tertiary Color").trim();

        if (!day) return;

        if (!groupedDaily[day]) groupedDaily[day] = {};

        addColor(day, primary, 3);
        addColor(day, secondary, 2);
        addColor(day, tertiary, 1);
      });

      function buildBarChart() {
  const dayOrder = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const days = dayOrder.filter(d => groupedDaily[d]);

  const allColors = {};

  // collect all colors
  days.forEach(day => {
    Object.keys(groupedDaily[day]).forEach(color => {
      if (!allColors[color]) allColors[color] = [];
    });
  });

  // fill data and normalize to 100%
  days.forEach(day => {
    const total = Object.values(groupedDaily[day]).reduce((a,b)=>a+b,0);
    Object.keys(allColors).forEach(color => {
      const value = groupedDaily[day][color] || 0;
      allColors[color].push(total ? (value / total) * 100 : 0); // % of total
    });
  });

  const datasets = Object.keys(allColors).map(color => ({
    label: color,
    data: allColors[color],
    backgroundColor: getColorFromMap(color),
    borderColor: color === "White" ? "#000" : "transparent",
    borderWidth: color === "White" ? 1 : 0
  }));

  if (barChartInstance) barChartInstance.destroy();

  barChartInstance = new Chart(document.getElementById("rightChart"), {
    type: "bar",
    data: { labels: days, datasets: datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: "bottom" } },
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true, max: 100, title: { display: true, text: "Percentage (%)" } }
      }
    }
  });
}

    
  </script>
</head>
<body>
  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <h2>Weekly Color Breakdown</h2>
      <label>Select Week:</label>
      <select id="weekSelect"></select>

      <div id="piechartOutfit" style="width: 100%; height: 400px;"></div>
      <div id="piechartFeeling" style="width: 100%; height: 400px;"></div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <h3>Daily Color %</h3>
      <canvas id="rightChart"></canvas>
    </div>

  </div>
</body>
</html>
